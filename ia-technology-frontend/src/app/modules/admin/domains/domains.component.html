<div class="py-8">
  <div class="flex justify-content-between align-items-center mb-4">
    <h1 class="text-3xl font-bold">Gestion des Domaines</h1>
    <p-button label="Ajouter" icon="pi pi-plus" (onClick)="openDialog()"></p-button>
  </div>

  <p-table [value]="domains" [paginator]="true" [rows]="10" responsiveLayout="scroll">
    <ng-template pTemplate="header">
      <tr>
        <th>Nom</th>
        <th>Catégorie</th>
        <th>Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-domain>
      <tr>
        <td>{{ domain.name }}</td>
        <td>{{ domain.category }}</td>
        <td>
          <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" (onClick)="editDomain(domain)"></p-button>
          <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" (onClick)="deleteDomain(domain.id)"></p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <p-dialog [(visible)]="displayDialog" header="Domaine" [modal]="true" [style]="{ width: '50vw' }">
    <form [formGroup]="form" (ngSubmit)="saveDomain()" class="flex flex-column gap-3">
      <div class="flex flex-column gap-2">
        <label>Nom</label>
        <input pInputText formControlName="name" />
      </div>
      <div class="flex flex-column gap-2">
        <label>Description</label>
        <textarea pInputTextarea formControlName="description" rows="3"></textarea>
      </div>
      <div class="flex flex-column gap-2">
        <label>Catégorie</label>
        <input pInputText formControlName="category" />
      </div>
      <p-button type="submit" label="Sauvegarder" [loading]="loading"></p-button>
    </form>
  </p-dialog>

  <p-toast></p-toast>
</div>
