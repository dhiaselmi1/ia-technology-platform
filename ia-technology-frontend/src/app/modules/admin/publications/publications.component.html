<div class="py-8">
  <h1 class="text-3xl font-bold mb-4">Gestion des Publications</h1>

  <p-table [value]="publications" [paginator]="true" [rows]="10" responsiveLayout="scroll">
    <ng-template pTemplate="header">
      <tr>
        <th>Titre</th>
        <th>Chercheur</th>
        <th>Domaine</th>
        <th>Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-pub>
      <tr>
        <td>{{ pub.title }}</td>
        <td>{{ pub.researcherName }}</td>
        <td>{{ pub.domainName }}</td>
        <td>
          <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" (onClick)="deletePublication(pub.id)"></p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <p-toast></p-toast>
</div>
