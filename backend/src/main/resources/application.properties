# ==========================================
# Server
# ==========================================
server.port=8080

# ==========================================
# PostgreSQL Database
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/ia_technology_db
spring.datasource.username=postgres
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# JWT
# ==========================================
app.jwt.secret=iatechnology-super-secret-key-2025-must-be-at-least-256-bits-long-for-hs256-algorithm
app.jwt.expiration=86400000

# ==========================================
# File Upload (PDF publications)
# ==========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# ==========================================
# AI Microservice (Python FastAPI)
# ==========================================
app.ai.service.url=http://localhost:8001

# ==========================================
# Swagger / OpenAPI
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
