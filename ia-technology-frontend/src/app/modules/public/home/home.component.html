<div class="py-8">
  <!-- Hero Section -->
  <div class="bg-gradient-to-r from-blue-500 to-purple-600 text-white rounded-lg p-12 mb-8 text-center">
    <h1 class="text-4xl font-bold mb-4">IA-Technology</h1>
    <p class="text-xl mb-6">Plateforme de gestion des travaux scientifiques</p>

    <div class="flex justify-content-center gap-2 mb-6">
      <p-inputGroup class="w-full" [style]="{ 'max-width': '500px' }">
        <input
          pInputText
          type="text"
          [(ngModel)]="searchQuery"
          (keyup.enter)="onSearch()"
          placeholder="Rechercher des publications..."
        />
        <p-button
          icon="pi pi-search"
          (onClick)="onSearch()"
          [text]="true"
        ></p-button>
      </p-inputGroup>
    </div>

    <div class="flex justify-content-center gap-3">
      <p-button
        label="Voir toutes les publications"
        routerLink="/user/search"
        [outlined]="true"
      ></p-button>
    </div>
  </div>

  <!-- Recent Publications -->
  <div class="mb-8">
    <h2 class="text-3xl font-bold mb-4">Publications Récentes</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      <p-card *ngFor="let pub of publications" class="h-full">
        <ng-template pTemplate="header">
          <div class="bg-gray-100 p-4 text-center">
            <p class="text-sm text-gray-600 m-0">{{ pub.domainName }}</p>
          </div>
        </ng-template>
        <h5 class="font-bold mb-2">{{ pub.title }}</h5>
        <p class="text-sm text-gray-600 mb-3">{{ pub.abstract_ | slice:0:100 }}...</p>
        <p class="text-xs text-gray-500 mb-3">Par: {{ pub.researcherName }}</p>
        <p-button
          label="Voir plus"
          [text]="true"
          icon="pi pi-arrow-right"
          iconPos="right"
        ></p-button>
      </p-card>
    </div>
  </div>

  <!-- News Section -->
  <div class="mb-8">
    <h2 class="text-3xl font-bold mb-4">Actualités</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      <p-card *ngFor="let item of news" class="h-full">
        <ng-template pTemplate="header">
          <div class="bg-blue-100 p-4 text-center">
            <p-tag
              *ngIf="item.featured"
              value="À la une"
              severity="success"
            ></p-tag>
          </div>
        </ng-template>
        <h5 class="font-bold mb-2">{{ item.title }}</h5>
        <p class="text-sm text-gray-600 mb-3">{{ item.content | slice:0:100 }}...</p>
        <p class="text-xs text-gray-500">Par: {{ item.authorUsername }}</p>
      </p-card>
    </div>
  </div>
</div>
